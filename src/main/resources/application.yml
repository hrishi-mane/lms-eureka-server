server:
  port: 8761

spring:
  application:
    name: eureka-server

eureka:
  instance:
    hostname: localhost
  client:
    # The server does not register itself or fetch registry
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/
  server:
    # Don't wait for peers on startup (single-node setup)
    wait-time-in-ms-when-sync-empty: 0
    # Disable self-preservation for dev/demo so instances deregister quickly
    enable-self-preservation: false
    eviction-interval-timer-in-ms: 5000

management:
  endpoints:
    web:
      exposure:
        include: health, info, eureka
  endpoint:
    health:
      show-details: always
